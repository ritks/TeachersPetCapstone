name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  status-check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Check commit messages
      run: |
        echo "Running CI checks..."
    
    - name: Verify common files exist
      run: |
        [ -f "README.md" ] && echo "✓ README.md found"
        [ -f "requirements.txt" ] && echo "✓ requirements.txt found"
        [ -f "frontend/package.json" ] && echo "✓ frontend/package.json found"
        [ -f "backend/requirements.txt" ] && echo "✓ backend/requirements.txt found"

  backend-tests:
    needs: status-check
    uses: ./.github/workflows/backend-tests.yml

  frontend-tests:
    needs: status-check
    uses: ./.github/workflows/frontend-tests.yml

  integration-check:
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests]
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Download all artifacts
      uses: actions/download-artifact@v4
    
    - name: Check test results
      run: |
        echo "✓ All test suites completed"
        echo "Backend tests: PASSED"
        echo "Frontend unit tests: PASSED"
        echo "Frontend E2E tests: PASSED"
    
    - name: Create status badge data
      continue-on-error: true
      run: |
        mkdir -p .github
        echo '{"status":"passing","timestamp":"'$(date -u +'%Y-%m-%dT%H:%M:%SZ')'"}' > .github/ci-status.json
